<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0e1117;
            --fg: #d4d8e0;
            --muted: #5c6370;
            --accent: #5eafd6;
            --accent-hover: #7ec4e8;
            --surface: #161b22;
            --border: #2a3040;
        }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .grain {
            position: fixed;
            inset: 0;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .container {
            text-align: center;
            animation: fadeUp 0.8s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 4rem;
            font-weight: 400;
            letter-spacing: -0.03em;
            margin-bottom: 0.25rem;
        }

        .tagline {
            color: var(--muted);
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }

        .section {
            margin-bottom: 2.5rem;
        }

        .section-label {
            color: var(--muted);
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        .input-group {
            display: flex;
            gap: 0;
            max-width: 520px;
            margin: 0 auto;
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .input-group:focus-within {
            border-color: var(--accent);
        }

        input {
            flex: 1;
            background: var(--surface);
            border: none;
            padding: 1rem 1.25rem;
            color: var(--fg);
            font-family: 'DM Mono', monospace;
            font-size: 0.9rem;
            outline: none;
        }

        input::placeholder {
            color: var(--muted);
        }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 1rem 1.75rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: background 0.2s;
            white-space: nowrap;
        }

        button:hover {
            background: var(--accent-hover);
        }

        .result {
            margin-top: 1rem;
            min-height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result a {
            color: var(--accent);
            text-decoration: none;
            font-size: 1.1rem;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .result a:hover {
            border-bottom-color: var(--accent);
        }

        .result .error {
            color: #cc4444;
            font-size: 0.85rem;
        }

        .divider {
            width: 120px;
            height: 1px;
            background: var(--border);
            margin: 0 auto 2.5rem;
        }

        .info-result {
            margin-top: 1rem;
            min-height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1rem 1.5rem;
            text-align: left;
            font-size: 0.85rem;
            line-height: 1.8;
            max-width: 520px;
            width: 100%;
        }

        .info-card .label {
            color: var(--muted);
            margin-right: 0.5rem;
        }

        .info-card .value {
            color: var(--fg);
        }

        .info-card .value a {
            color: var(--accent);
            text-decoration: none;
        }

        .info-card .value a:hover {
            text-decoration: underline;
        }

        .info-result .error {
            color: #cc4444;
            font-size: 0.85rem;
        }

        footer {
            position: fixed;
            bottom: 2rem;
            color: var(--muted);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="grain"></div>
    <div class="container">
        <h1>Link Shortener</h1>
        <p class="tagline">shorten &amp; track your links</p>

        <div class="section">
            <p class="section-label">Shorten a URL</p>
            <div class="input-group">
                <input type="url" id="url" placeholder="paste a url..." autocomplete="off" />
                <button id="shorten">Shorten</button>
            </div>
            <div class="result" id="result"></div>
        </div>

        <div class="divider"></div>

        <div class="section">
            <p class="section-label">Get info on a shortened link</p>
            <div class="input-group">
                <input type="text" id="slug" placeholder="enter a slug..." autocomplete="off" />
                <button id="lookup">Look up</button>
            </div>
            <div class="info-result" id="info-result"></div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('url');
        const shortenBtn = document.getElementById('shorten');
        const result = document.getElementById('result');

        const slugInput = document.getElementById('slug');
        const lookupBtn = document.getElementById('lookup');
        const infoResult = document.getElementById('info-result');

        shortenBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if (!url) return;

            result.innerHTML = '';
            try {
                const res = await fetch('/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ link: url })
                });
                if (!res.ok) {
                    const err = await res.json();
                    result.innerHTML = `<span class="error">${err.detail?.[0].msg || 'Something went wrong'}</span>`;
                    return;
                }
                const data = await res.json();
                const short = `${window.location.origin}/${data.slug}`;
                result.innerHTML = `<a href="${short}" target="_blank">${short}</a>`;
            } catch (e) {
                result.innerHTML = `<span class="error">Could not reach server</span>`;
            }
        });

        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') shortenBtn.click();
        });

        lookupBtn.addEventListener('click', async () => {
            let slug = slugInput.value.trim();
            if (!slug) return;

            // strip leading slash or full URL down to just the slug
            if (slug.startsWith('http')) {
                try { slug = new URL(slug).pathname.replace(/^\//, ''); } catch {}
            }
            slug = slug.replace(/^\//, '');

            infoResult.innerHTML = '';
            try {
                const res = await fetch(`/info/${encodeURIComponent(slug)}`);
                if (!res.ok) {
                    infoResult.innerHTML = `<span class="error">Slug not found</span>`;
                    return;
                }
                const data = await res.json();
                const date = new Date(data.createdAt * 1000).toLocaleDateString('en-US', {
                    year: 'numeric', month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
                infoResult.innerHTML = `
                    <div class="info-card">
                        <div><span class="label">url</span><span class="value"><a href="${data.url}" target="_blank">${data.url}</a></span></div>
                        <div><span class="label">created</span><span class="value">${date}</span></div>
                        <div><span class="label">clicks</span><span class="value">${data.clicks}</span></div>
                    </div>
                `;
            } catch (e) {
                infoResult.innerHTML = `<span class="error">Could not reach server</span>`;
            }
        });

        slugInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') lookupBtn.click();
        });
    </script>
</body>
</html>
