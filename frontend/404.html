<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Link Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0e1117;
            --fg: #d4d8e0;
            --muted: #5c6370;
            --accent: #5eafd6;
            --surface: #161b22;
            --border: #2a3040;
        }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .grain {
            position: fixed;
            inset: 0;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .container {
            text-align: center;
            animation: fadeUp 0.8s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .code {
            font-family: 'Instrument Serif', serif;
            font-size: 8rem;
            font-weight: 400;
            letter-spacing: -0.03em;
            line-height: 1;
            color: var(--muted);
        }

        .code span {
            color: var(--accent);
        }

        .message {
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 1rem;
            margin-bottom: 2.5rem;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-bottom: 1px solid transparent;
            padding-bottom: 2px;
            transition: border-color 0.2s;
        }

        a:hover {
            border-bottom-color: var(--accent);
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            opacity: 0.4;
            animation: drift 2s ease-in-out infinite;
        }

        @keyframes drift {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        footer {
            position: fixed;
            bottom: 2rem;
            color: var(--muted);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="grain"></div>
    <div class="container">
        <div class="icon">🔗</div>
        <div class="code">4<span>0</span>4</div>
        <p class="message">this link doesn't exist</p>
        <a href="/">← back to home</a>
    </div>
</body>
</html>
